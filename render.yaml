# Render Blueprint — deploy all three apps from one repo
# Dashboard: New → Blueprint → connect GitHub repo → apply this file
# Set MONGODB_URI manually on the API service after first deploy

services:
  - type: web
    name: airbnb-capstone-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: MONGODB_URI
        sync: false
      - key: CLIENT_URL
        fromService:
          type: web
          name: airbnb-capstone-client
          envVarKey: RENDER_EXTERNAL_URL
      - key: ADMIN_URL
        fromService:
          type: web
          name: airbnb-capstone-admin
          envVarKey: RENDER_EXTERNAL_URL

  - type: web
    name: airbnb-capstone-client
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build:prod
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: airbnb-capstone-api
          envVarKey: RENDER_EXTERNAL_URL

  - type: web
    name: airbnb-capstone-admin
    runtime: static
    rootDir: admin
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: airbnb-capstone-api
          envVarKey: RENDER_EXTERNAL_URL
      - key: VITE_CLIENT_URL
        fromService:
          type: web
          name: airbnb-capstone-client
          envVarKey: RENDER_EXTERNAL_URL
